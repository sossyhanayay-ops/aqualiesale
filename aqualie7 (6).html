<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AQUALIE 売上管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f0ede8;color:#1a1a18;font-size:14px;-webkit-tap-highlight-color:transparent;height:100%;overflow:hidden}
button,input,select{font-family:inherit}
.hidden{display:none!important}

/* ===== TOP ===== */
#scTop{display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 4rem}
.app-title{font-size:20px;font-weight:800;margin-bottom:1.4rem}
.month-nav{display:flex;align-items:center;gap:16px;margin-bottom:1.2rem}
.month-nav button{background:none;border:1px solid #ccc;border-radius:50%;width:32px;height:32px;font-size:18px;color:#555;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-now{font-size:18px;font-weight:700;min-width:90px;text-align:center}
.store-block{width:100%;max-width:520px;margin-bottom:1.2rem}
.store-title{font-size:10px;font-weight:800;letter-spacing:.15em;color:#888;margin-bottom:6px}

/* 横長行スタイル名前リスト */
.staff-list{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.staff-row{background:#fff;border:1.5px solid #e0dbd3;border-radius:14px;padding:14px 12px;cursor:pointer;transition:all .13s;text-align:left;display:flex;flex-direction:column;gap:5px}
.staff-row:hover{border-color:#2E75B6;box-shadow:0 2px 8px rgba(46,117,182,.15)}
.staff-row:active{transform:scale(.96)}
.staff-row-name{font-size:15px;font-weight:800;color:#1a1a18}
.staff-row-bar{height:5px;background:#eee;border-radius:3px;overflow:hidden}
.staff-row-bar-f{height:100%;border-radius:3px;transition:width .3s}
.staff-row-pct{font-size:11px;color:#888}
.staff-row-amt{font-size:13px;font-weight:800}

.bottom-row{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;justify-content:center}
.btn-ghost{background:none;border:1px solid #bbb;border-radius:10px;padding:9px 18px;font-size:12px;color:#666;cursor:pointer}
.btn-ghost:hover{background:#e8e4de}

/* ===== 入力画面（aqualie4スタイル）===== */
#scInput{display:none;flex-direction:column;align-items:center;background:#f0ede8;padding:1.5rem 1rem}
.back-bar{width:100%;max-width:420px;display:flex;align-items:center;gap:8px;margin-bottom:1.2rem}
.btn-back{background:none;border:none;font-size:22px;color:#666;cursor:pointer;padding:2px 6px}
.back-sub{font-size:13px;color:#888}
.in-card{background:#fff;border-radius:20px;border:1.5px solid #e0dbd3;padding:1.6rem 1.4rem;width:100%;max-width:420px}
.in-name{font-size:24px;font-weight:800;text-align:center;margin-bottom:2px}
.in-mon{font-size:12px;color:#888;text-align:center;margin-bottom:1.2rem}
.no-row{display:flex;gap:5px;justify-content:center;margin-bottom:.5rem;flex-wrap:wrap}
.no-btn{padding:7px 10px;border:1.5px solid #ddd;border-radius:20px;font-size:12px;font-weight:700;background:#fff;color:#888;cursor:pointer;transition:all .13s;position:relative}
.no-btn.act{background:#2E75B6;border-color:#2E75B6;color:#fff}
.no-done{position:absolute;top:-4px;right:-4px;width:10px;height:10px;background:#375623;border-radius:50%}
.no-hint{font-size:11px;color:#2E75B6;text-align:center;margin-bottom:1rem;font-weight:600}
/* 残ストリップ（aqualie4スタイル） */
.nokori-strip{background:#FFF8E1;border:1.5px solid #FFD54F;border-radius:10px;padding:10px 14px;margin-bottom:1rem;text-align:center}
.nokori-lbl{font-size:11px;color:#888;margin-bottom:2px}
.nokori-val{font-size:20px;font-weight:800}
.nokori-val.green{color:#375623}
.nokori-val.red{color:#CC0000}
/* 2列入力（aqualie4スタイル） */
.input-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.ig{display:flex;flex-direction:column;gap:4px}
.ig-lbl{font-size:11px;color:#888;font-weight:700;text-align:center}
.ig-wrap{position:relative}
.ig-in{width:100%;font-size:22px;font-weight:800;text-align:center;border:2px solid #ddd;border-radius:12px;padding:12px 28px 12px 8px;outline:none;color:#1a1a18;background:#fff;transition:border .14s}
.ig-in:focus{border-color:#2E75B6}
.ig-in::placeholder{color:#ccc;font-size:16px}
.ig-sfx{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:12px;color:#888;font-weight:700}
.btn-save{width:100%;padding:15px;background:#2E75B6;border:none;border-radius:13px;color:#fff;font-size:17px;font-weight:800;cursor:pointer;transition:all .13s;margin-bottom:.6rem}
.btn-save:hover{background:#1F5A99}
.btn-save:active{transform:scale(.97)}
.btn-clr{background:none;border:1px solid #bbb;border-radius:9px;padding:7px 16px;font-size:12px;color:#888;cursor:pointer}

/* ===== 一覧表 ===== */
#scList{display:none;background:#f0ede8;padding:1rem}
.lhdr{display:flex;align-items:center;gap:8px;margin-bottom:.7rem}
.lhdr-title{font-size:15px;font-weight:800;flex:1}
.l-nav{display:flex;gap:4px}
.l-nav button{background:none;border:1px solid #bbb;border-radius:6px;padding:3px 10px;font-size:14px;color:#666;cursor:pointer}
.store-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.7rem}
.stab{padding:6px 14px;border:1.5px solid #ddd;border-radius:20px;font-size:12px;background:#fff;color:#888;cursor:pointer}
.stab.act{background:#1F4E79;border-color:#1F4E79;color:#fff}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;margin-bottom:.6rem}

.ex-tbl{border-collapse:collapse;font-size:10px;white-space:nowrap;background:#fff}
.tr-title td{background:#D6E4F0;font-size:12px;font-weight:800;text-align:center;padding:8px;color:#1F4E79;border:1px solid #9DC3E6}
.ex-tbl th{padding:5px 5px;text-align:center;font-size:9px;font-weight:700;border:1px solid #5E9BC6}
.th-dk{background:#1F4E79;color:#fff}
.th-no{background:#2E75B6;color:#fff}
.th-tgt{background:#BDD7EE;color:#1F4E79;font-size:8px!important}
.th-act{background:#9DC3E6;color:#1F4E79}
.ex-tbl td{border:1px solid #CED9E6;padding:4px 5px;text-align:right;vertical-align:middle}
.td-name{background:#EBF3FB!important;color:#1F4E79!important;font-weight:800!important;font-size:10px!important;text-align:center!important;border:1px solid #9DC3E6!important}
.td-lbl{background:#F2F2F2!important;color:#444!important;font-size:9px!important;font-weight:700!important;text-align:center!important;min-width:44px;border:1px solid #CED9E6!important}
.td-month{background:#EBF3FB;color:#1F4E79;font-weight:800;border:1px solid #9DC3E6!important}
.td-tgt{background:#F7FBFF;color:#777;font-size:9px}
.td-act{background:#fff}
.td-ach{background:#FFFF00!important;font-weight:800!important;color:#1a1a18!important}
/* 残: 足りてない=赤（数字のみ）、達成=緑（−表示） */
.td-nk{min-width:48px;font-weight:800;background:#FFF8E1}
.td-nk.short{color:#CC0000}   /* 不足 → 赤、数字のみ */
.td-nk.over{color:#375623}    /* 達成 → 緑、−表示 */
.td-nk.zero{color:#375623}
.td-nk.none{background:#F7FBFF;color:#bbb}
.td-unit{background:#FAFAFA;color:#666}
/* 合計行 */
.tr-store-sum td{background:#D6E4F0!important;font-weight:800!important;color:#1F4E79!important}
.tr-all-sum td{background:#1F4E79!important;color:#fff!important;font-weight:800!important}

/* ===== 管理者 ===== */
#scAdmin{display:none;background:#f0ede8;padding:1rem}
.adm-sec{background:#fff;border-radius:12px;padding:1rem;margin-bottom:1rem;border:.5px solid #ddd}
.adm-ttl{font-size:13px;font-weight:800;margin-bottom:10px}
.adm-tbl{width:100%;border-collapse:collapse;font-size:12px}
.adm-tbl th{background:#f5f2ed;padding:6px 8px;font-weight:700;font-size:11px;color:#666;border-bottom:1px solid #ddd;text-align:left}
.adm-tbl td{padding:6px 8px;border-bottom:.5px solid #f0ede8;vertical-align:middle}
.adm-in{padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;width:90px;text-align:right}
.adm-in:focus{outline:none;border-color:#2E75B6}
.btn-add{padding:6px 14px;background:#2E75B6;border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.btn-del{padding:3px 8px;background:none;border:1px solid #e24b4a;border-radius:6px;font-size:11px;color:#e24b4a;cursor:pointer}
.btn-admsave{width:100%;padding:12px;background:#1F4E79;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:800;cursor:pointer;margin-top:.5rem}
.sel{padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:#fff;border-radius:18px;padding:1.5rem;width:88%;max-width:300px;text-align:center}
.modal-ttl{font-size:18px;font-weight:800;margin-bottom:6px}
.modal-sub{font-size:13px;color:#888;margin-bottom:1.2rem}
.modal-in{width:100%;padding:12px;border:2px solid #ddd;border-radius:11px;font-size:22px;text-align:center;letter-spacing:.3em;outline:none;margin-bottom:1rem}
.modal-in:focus{border-color:#2E75B6}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer}
.m-ok{background:#1F4E79;color:#fff}
.m-cancel{background:#f0ede8;color:#1a1a18}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#2E75B6;color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:700;transition:transform .3s;z-index:300;white-space:nowrap}
</style>
</head>
<body>


<!-- TOP -->
<div id="scTop">
  <div class="app-title">AQUALIE 売上管理</div>
  <div class="month-nav">
    <button onclick="chMonth(-1)">&#8249;</button>
    <div class="month-now" id="monNow"></div>
    <button onclick="chMonth(1)">&#8250;</button>
  </div>
  <div id="storeBlocks"></div>
  <div class="bottom-row">
    <button class="btn-ghost" onclick="goList()">📋 月別一覧表</button>
    <button class="btn-ghost" onclick="promptPw()">⚙ 管理者</button>
  </div>
</div>

<!-- 入力（aqualie4スタイル） -->
<div id="scInput">
  <div class="back-bar">
    <button class="btn-back" onclick="goTop()">&#8592;</button>
    <span class="back-sub" id="inSub"></span>
  </div>
  <div class="in-card">
    <div class="in-name" id="inName"></div>
    <div class="in-mon" id="inMon"></div>
    <div class="no-row" id="noRow"></div>
    <div class="no-hint" id="noHint"></div>
    <div class="nokori-strip">
      <div class="nokori-lbl" id="nokoriLbl">残額</div>
      <div class="nokori-val" id="nokoriVal">—</div>
    </div>
    <div class="input-2col">
      <div class="ig">
        <div class="ig-lbl">売上金額</div>
        <div class="ig-wrap">
          <input type="number" class="ig-in" id="amtIn" placeholder="0" inputmode="numeric">
          <span class="ig-sfx">円</span>
        </div>
      </div>
      <div class="ig">
        <div class="ig-lbl">購入客数</div>
        <div class="ig-wrap">
          <input type="number" class="ig-in" id="cntIn" placeholder="0" inputmode="numeric">
          <span class="ig-sfx">名</span>
        </div>
      </div>
    </div>
    <button class="btn-save" onclick="saveAmt()">保存する</button><br>
    <button class="btn-clr" onclick="clearInputs()">クリア</button>
  </div>
</div>

<!-- 一覧表 -->
<div id="scList">
  <div class="lhdr">
    <button class="btn-back" onclick="goTop()">&#8592;</button>
    <div class="lhdr-title" id="listTtl"></div>
    <div class="l-nav">
      <button onclick="chListMon(-1)">&#8249;</button>
      <button onclick="chListMon(1)">&#8250;</button>
    </div>
  </div>
  <div class="store-tabs" id="listTabs"></div>
  <div class="tbl-scroll" id="listWrap"></div>
  <div style="text-align:center;padding:.8rem 0 1.5rem">
    <button class="btn-ghost" style="background:#1F4E79;color:#fff;border-color:#1F4E79;padding:10px 24px;font-size:13px;font-weight:700" onclick="exportExcel()">📥 Excelに出力 (.xlsx)</button>
  </div>
</div>

<!-- 管理者 -->
<div id="scAdmin">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem">
    <button class="btn-back" onclick="goTop()">&#8592;</button>
    <span style="font-size:16px;font-weight:800">管理者設定</span>
  </div>
  <div class="adm-sec">
    <div class="adm-ttl">📅 目標設定期間</div>
    <select class="sel" id="admPeriod" style="margin-right:6px">
      <option value="H1">上半期（1〜6月）</option>
      <option value="H2">下半期（7〜12月）</option>
    </select>
    <select class="sel" id="admYear"></select>
  </div>
  <div class="adm-sec" id="admStaffSec"></div>
  <div class="adm-sec">
    <div class="adm-ttl">🏪 店舗管理</div>
    <div id="admStoreList" style="margin-bottom:10px"></div>
    <div style="display:flex;gap:6px">
      <input id="newSN" style="flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px" placeholder="店舗名">
      <button class="btn-add" onclick="addStore()">追加</button>
    </div>
  </div>
  <div class="adm-sec">
    <div class="adm-ttl">🔑 パスワード変更</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:#666;width:90px">現在のPW</span>
        <input type="password" id="pwCur" style="flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;letter-spacing:.2em" placeholder="現在のパスワード">
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:#666;width:90px">新しいPW</span>
        <input type="password" id="pwNew" style="flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;letter-spacing:.2em" placeholder="新しいパスワード">
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:#666;width:90px">確認</span>
        <input type="password" id="pwNew2" style="flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;letter-spacing:.2em" placeholder="新しいパスワード（確認）">
      </div>
      <button class="btn-add" style="align-self:flex-end;padding:8px 20px" onclick="changePw()">パスワード変更</button>
      <div id="pwMsg" style="font-size:12px;text-align:center;min-height:18px"></div>
    </div>
  </div>
  <button class="btn-admsave" onclick="saveAdmin()">💾 保存して戻る</button>
</div>

<div class="modal hidden" id="pwModal">
  <div class="modal-box">
    <div class="modal-ttl">管理者認証</div>
    <div class="modal-sub">パスワードを入力</div>
    <input type="password" class="modal-in" id="pwIn" maxlength="8" placeholder="••••">
    <div class="modal-btns">
      <button class="m-cancel" onclick="closePw()">キャンセル</button>
      <button class="m-ok" onclick="checkPw()">確認</button>
    </div>
  </div>
</div>
<div id="toast">保存しました ✓</div>

<script>
let _pw=localStorage.getItem('aq_pw')||'1234';
function getPW(){return localStorage.getItem('aq_pw')||'1234';}
const NP=[20,30,50,70,85,100];
const KS='aq9_s',KD='aq9_d',KG='aq9_g';

// アルファベットラベル生成
function alphaLabel(idx){
  let s='',n=idx;
  do{s=String.fromCharCode(65+(n%26))+s;n=Math.floor(n/26)-1;}while(n>=0);
  return s;
}

let stores=JSON.parse(localStorage.getItem(KS)||'null')||[
  {id:'honten',name:'本店',staff:[
    {name:'A',target:0,goal:0},{name:'B',target:0,goal:0},
    {name:'C',target:0,goal:0},{name:'D',target:0,goal:0},
    {name:'E',target:0,goal:0},{name:'F',target:0,goal:0},
    {name:'G',target:0,goal:0},{name:'H',target:0,goal:0},
    {name:'I',target:0,goal:0},{name:'J',target:0,goal:0},
    {name:'K',target:0,goal:0},{name:'L',target:0,goal:0},
    {name:'M',target:0,goal:0}
  ]},
  {id:'sanpukuji',name:'三福寺',staff:[
    {name:'A',target:0,goal:0},{name:'B',target:0,goal:0},
    {name:'C',target:0,goal:0},{name:'D',target:0,goal:0},
    {name:'E',target:0,goal:0},{name:'F',target:0,goal:0}
  ]},
  {id:'kamioka',name:'神岡',staff:[
    {name:'A',target:0,goal:0},{name:'B',target:0,goal:0},
    {name:'C',target:0,goal:0},{name:'D',target:0,goal:0}
  ]}
];
let sdata=JSON.parse(localStorage.getItem(KD)||'{}');
let goals=JSON.parse(localStorage.getItem(KG)||'{}');
const st={y:new Date().getFullYear(),m:new Date().getMonth()+1,lm:new Date().getMonth()+1,lstoreId:null,inSid:null,inName:null,selNo:1};

function saveAll(){localStorage.setItem(KS,JSON.stringify(stores));localStorage.setItem(KD,JSON.stringify(sdata));localStorage.setItem(KG,JSON.stringify(goals));}
function per(m){return m<=6?'H1':'H2';}
function gkey(sid,n,y,p){return sid+'|'+n+'|'+y+'|'+p;}
function sGoal(sid,n,y,m){
  const k=gkey(sid,n,y,per(m));if(goals[k])return goals[k];
  const s=stores.find(x=>x.id===sid),sf=s&&s.staff.find(x=>x.name===n);
  return sf?{target:sf.target,goal:sf.goal}:{target:0,goal:0};
}
function dk(y,m,sid,n,no,t){return y+'_'+m+'_'+sid+'_'+n+'_no'+no+'_'+t;}
function getAmt(y,m,sid,n,no){const v=sdata[dk(y,m,sid,n,no,'amt')];return v===undefined?null:v;}
function getCnt(y,m,sid,n,no){const v=sdata[dk(y,m,sid,n,no,'cnt')];return v===undefined?null:v;}
function setAmt(y,m,sid,n,no,v){sdata[dk(y,m,sid,n,no,'amt')]=v;}
function setCnt(y,m,sid,n,no,v){sdata[dk(y,m,sid,n,no,'cnt')]=v;}

function hideAll(){['scTop','scInput','scList','scAdmin'].forEach(id=>document.getElementById(id).style.display='none');}
function goTop(){hideAll();document.getElementById('scTop').style.display='flex';renderTop();}
function goList(){hideAll();document.getElementById('scList').style.display='block';if(!st.lstoreId)st.lstoreId=stores[0]&&stores[0].id;renderList();}
function goAdmin(){hideAll();document.getElementById('scAdmin').style.display='block';renderAdmin();}

// ===== TOP：横長行スタイル =====
function chMonth(d){st.m+=d;if(st.m>12){st.m=1;st.y++;}if(st.m<1){st.m=12;st.y--;}renderTop();}
function renderTop(){
  document.getElementById('monNow').textContent=st.y+'年'+st.m+'月';
  const wrap=document.getElementById('storeBlocks');wrap.innerHTML='';
  stores.forEach(store=>{
    const sec=document.createElement('div');sec.className='store-block';
    const ttl=document.createElement('div');ttl.className='store-title';ttl.textContent=store.name;
    const list=document.createElement('div');list.className='staff-list';
    sec.appendChild(ttl);sec.appendChild(list);wrap.appendChild(sec);

    store.staff.forEach((staff,idx)=>{
      const g=sGoal(store.id,staff.name,st.y,st.m);
      let latAmt=0,latNo=0;
      for(let n=6;n>=1;n--){const v=getAmt(st.y,st.m,store.id,staff.name,n);if(v!==null){latAmt=v;latNo=n;break;}}
      const pct=g.goal>0?Math.min(100,Math.round(latAmt/g.goal*100)):0;
      const col=pct>=100?'#375623':pct>=85?'#BA7517':'#CC0000';

      const row=document.createElement('button');row.className='staff-row';
      row.innerHTML=
        '<div class="staff-row-name">'+staff.name+'</div>'+
        '<div class="staff-row-right">'+
          '<div class="staff-row-pct">'+(latNo?'NO.'+latNo+' ':'')+pct+'%</div>'+
          '<div class="staff-row-amt" style="color:'+col+'">'+(latNo?'¥'+latAmt.toLocaleString():'-')+'</div>'+
          '<div class="staff-row-bar"><div class="staff-row-bar-f" style="width:'+pct+'%;background:'+col+'"></div></div>'+
        '</div>';
      row.onclick=(function(s,n){return function(){openInput(s,n);};})(store.id,staff.name);
      list.appendChild(row);
    });
  });
}

// ===== 入力画面（aqualie4スタイル）=====
function openInput(sid,name){
  st.inSid=sid;st.inName=name;
  let last=0;for(let n=1;n<=6;n++){if(getAmt(st.y,st.m,sid,name,n)!==null)last=n;}
  st.selNo=Math.min(6,(last||0)+1);
  hideAll();document.getElementById('scInput').style.display='flex';
  renderInput();setTimeout(()=>document.getElementById('amtIn').focus(),200);
}

function updateNokori(){
  const{inSid,inName,y,m,selNo}=st;
  const g=sGoal(inSid,inName,y,m);
  const tgt=Math.round(g.goal*NP[selNo-1]/100);
  const raw=document.getElementById('amtIn').value;
  const act=raw===''?null:parseInt(raw);
  const el=document.getElementById('nokoriVal');
  if(act===null){el.textContent='¥'+tgt.toLocaleString();el.className='nokori-val';return;}
  const rem=tgt-act;
  if(rem>0){el.textContent='¥'+rem.toLocaleString();el.className='nokori-val red';}
  else if(rem<0){el.textContent='−¥'+Math.abs(rem).toLocaleString();el.className='nokori-val green';}
  else{el.textContent='¥0（ぴったり達成）';el.className='nokori-val green';}
}

function renderInput(){
  const{inSid,inName,y,m,selNo}=st;
  const store=stores.find(s=>s.id===inSid);
  const g=sGoal(inSid,inName,y,m);
  document.getElementById('inSub').textContent=(store?store.name:'')+' / '+y+'年'+m+'月';
  document.getElementById('inName').textContent=inName;
  document.getElementById('inMon').textContent=y+'年'+m+'月';
  const row=document.getElementById('noRow');row.innerHTML='';
  for(let n=1;n<=6;n++){
    const b=document.createElement('button');
    const done=getAmt(y,m,inSid,inName,n)!==null;
    b.className='no-btn'+(n===selNo?' act':'');
    b.innerHTML='NO.'+n+(done?'<span class="no-done"></span>':'');
    (function(_n){b.onclick=function(){st.selNo=_n;renderInput();};})(n);
    row.appendChild(b);
  }
  const tgtA=Math.round(g.goal*NP[selNo-1]/100);
  const tgtC=Math.round(g.target*NP[selNo-1]/100);
  document.getElementById('noHint').textContent='NO.'+selNo+' 目標: ¥'+tgtA.toLocaleString()+' / '+tgtC+'名';
  document.getElementById('nokoriLbl').textContent='NO.'+selNo+' 残額（目標 ¥'+tgtA.toLocaleString()+'）';
  const curAmt=getAmt(y,m,inSid,inName,selNo);
  const curCnt=getCnt(y,m,inSid,inName,selNo);
  document.getElementById('amtIn').value=curAmt!==null?curAmt:'';
  document.getElementById('cntIn').value=curCnt!==null?curCnt:'';
  updateNokori();
  document.getElementById('amtIn').oninput=updateNokori;
}

function clearInputs(){document.getElementById('amtIn').value='';document.getElementById('cntIn').value='';updateNokori();}

function saveAmt(){
  const amtStr=document.getElementById('amtIn').value;
  const cntStr=document.getElementById('cntIn').value;
  const{y,m,inSid,inName,selNo}=st;
  if(amtStr!=='')setAmt(y,m,inSid,inName,selNo,parseInt(amtStr));
  if(cntStr!=='')setCnt(y,m,inSid,inName,selNo,parseInt(cntStr));
  saveAll();
  showToast('NO.'+selNo+' 保存しました ✓');
  // 次のNOへ進めるが画面はそのまま
  if(selNo<6){st.selNo=selNo+1;}
  renderInput();
}

// 残セル: 足りてない=赤・数字のみ / 達成=緑・−表示 / 未入力=空
function nkCell(tgt,act,hasAct){
  if(!hasAct) return{cls:'td-nk none',txt:''};
  const r=tgt-act;
  if(r>0)  return{cls:'td-nk short',txt:r.toLocaleString()};       // 不足: 赤・数字のみ
  if(r<0)  return{cls:'td-nk over', txt:'−'+Math.abs(r).toLocaleString()}; // 超過: 緑・−
  return    {cls:'td-nk zero', txt:'±0'};
}

function buildTable(store,y,m){
  // 列: 名前(rowspan3) | 区分 | 月間目標(rowspan3) | [NO1:目標/実績]*6 | 売上残 | 客数残
  const totalCols=3+6*2+2;
  let html='<table class="ex-tbl">';
  html+='<tr class="tr-title"><td colspan="'+totalCols+'">【'+y+'年'+m+'月度】AQUALIE　'+store.name+'</td></tr>';
  html+='<tr>'+
    '<th class="th-dk" rowspan="2" style="min-width:50px">スタッフ</th>'+
    '<th class="th-dk" rowspan="2" style="min-width:44px">区分</th>'+
    '<th class="th-no" rowspan="2" style="min-width:60px">月間目標</th>';
  for(let i=0;i<6;i++) html+='<th class="th-no" colspan="2">NO.'+(i+1)+'</th>';
  html+='<th class="th-dk" rowspan="2" style="min-width:50px">売上残<br><span style="font-size:8px;font-weight:400">目標−実績</span></th>'+
        '<th class="th-dk" rowspan="2" style="min-width:46px">客数残<br><span style="font-size:8px;font-weight:400">目標−実績</span></th></tr>';
  html+='<tr>';
  for(let i=0;i<6;i++){
    html+='<th class="th-tgt" style="min-width:50px">目標<br><span style="font-size:8px;font-weight:400">'+NP[i]+'%</span></th>'+
          '<th class="th-act" style="min-width:50px">実績</th>';
  }
  html+='</tr>';

  let totGoal=0,totTgt=0;
  let sumAA=Array(6).fill(0),sumAC=Array(6).fill(0),sumTA=Array(6).fill(0),sumTC=Array(6).fill(0);
  let hasAA=Array(6).fill(false),hasAC=Array(6).fill(false);

  store.staff.forEach(staff=>{
    const g=sGoal(store.id,staff.name,y,m);
    const amts=[],cnts=[];
    for(let n=1;n<=6;n++){amts.push(getAmt(y,m,store.id,staff.name,n));cnts.push(getCnt(y,m,store.id,staff.name,n));}
    totGoal+=g.goal;totTgt+=g.target;

    // 最新NO（残表示用）
    let latNo=0;for(let n=6;n>=1;n--){if(amts[n-1]!==null){latNo=n;break;}}
    let latNoC=0;for(let n=6;n>=1;n--){if(cnts[n-1]!==null){latNoC=n;break;}}

    const nkA=latNo>0 ? nkCell(Math.round(g.goal*NP[latNo-1]/100), amts[latNo-1], true) : {cls:'td-nk none',txt:''};
    const nkC=latNoC>0 ? nkCell(Math.round(g.target*NP[latNoC-1]/100), cnts[latNoC-1], true) : {cls:'td-nk none',txt:''};

    // 購入客目標行
    let r1='<tr><td class="td-name" rowspan="3">'+staff.name+'</td><td class="td-lbl">購入客目標</td>';
    r1+='<td class="td-month" rowspan="3" style="font-size:9px;text-align:right">¥'+g.goal.toLocaleString()+'<br><span style="font-weight:400;color:#888">'+g.target+'名</span></td>';
    for(let i=0;i<6;i++){
      const tC=Math.round(g.target*NP[i]/100),aC=cnts[i];
      const hC=aC!==null;
      const ach=hC&&aC>=tC;
      sumAC[i]+=(hC?aC:0);sumTC[i]+=tC;if(hC)hasAC[i]=true;
      r1+='<td class="td-tgt">'+tC+'</td><td class="'+(hC?(ach?'td-ach':'td-act'):'td-act')+'">'+(hC?aC:'')+'</td>';
    }
    r1+='<td class="'+nkA.cls+'" rowspan="3">'+nkA.txt+'</td>'+
        '<td class="'+nkC.cls+'" rowspan="3">'+nkC.txt+'</td></tr>';

    // 目標（売上）行
    let r2='<tr><td class="td-lbl">目標</td>';
    for(let i=0;i<6;i++){
      const tA=Math.round(g.goal*NP[i]/100),aA=amts[i];
      const hA=aA!==null;
      const ach=hA&&aA>=tA;
      sumAA[i]+=(hA?aA:0);sumTA[i]+=tA;if(hA)hasAA[i]=true;
      r2+='<td class="td-tgt">'+tA.toLocaleString()+'</td><td class="'+(hA?(ach?'td-ach':'td-act'):'td-act')+'">'+(hA?aA.toLocaleString():'')+'</td>';
    }
    r2+='</tr>';

    // 購入単価行
    let r3='<tr><td class="td-lbl">購入単価</td>';
    for(let i=0;i<6;i++){
      const a=amts[i],c=cnts[i];
      const u=(a!==null&&c!==null&&c>0)?Math.round(a/c):null;
      r3+='<td class="td-tgt"></td><td class="td-unit">'+(u!==null?u.toLocaleString():'')+'</td>';
    }
    r3+='</tr>';
    html+=r1+r2+r3;
  });

  // 店舗合計（シンプルな合計のみ）
  let sc1='<tr class="tr-store-sum"><td colspan="2">'+store.name+'　合計（客数）</td><td>'+totTgt+'名</td>';
  let sc2='<tr class="tr-store-sum"><td colspan="2">'+store.name+'　合計（売上）</td><td>¥'+totGoal.toLocaleString()+'</td>';
  for(let i=0;i<6;i++){
    sc1+='<td>'+sumTC[i]+'</td><td>'+(hasAC[i]?sumAC[i]:'')+'</td>';
    sc2+='<td>'+sumTA[i].toLocaleString()+'</td><td>'+(hasAA[i]?sumAA[i].toLocaleString():'')+'</td>';
  }
  // 合計の残
  const scNA=nkCell(totGoal, sumAA[5], hasAA[5]);
  const scNC=nkCell(totTgt,  sumAC[5], hasAC[5]);
  sc1+='<td class="'+scNA.cls+'">'+scNA.txt+'</td><td class="'+scNC.cls+'">'+scNC.txt+'</td></tr>';
  sc2+='<td></td><td></td></tr>';
  html+=sc1+sc2+'</table>';

  return{html,totGoal,totTgt,sumAA,sumAC,sumTA,sumTC,hasAA,hasAC};
}

function renderList(){
  const y=st.y,m=st.lm;
  document.getElementById('listTtl').textContent=y+'年'+m+'月 一覧';
  document.getElementById('listTabs').innerHTML=stores.map(s=>
    '<button class="stab'+(s.id===st.lstoreId?' act':'')+'" onclick="setLS(\''+s.id+'\')">'+s.name+'</button>'
  ).join('');
  const store=stores.find(s=>s.id===st.lstoreId);
  if(!store){document.getElementById('listWrap').innerHTML='';return;}
  const{html}=buildTable(store,y,m);

  // 全店合計
  let aG=0,aT=0,aAA=Array(6).fill(0),aAC=Array(6).fill(0),aTA=Array(6).fill(0),aTC=Array(6).fill(0);
  let hAA=Array(6).fill(false),hAC=Array(6).fill(false);
  stores.forEach(s=>{
    const r=buildTable(s,y,m);aG+=r.totGoal;aT+=r.totTgt;
    for(let i=0;i<6;i++){aAA[i]+=r.sumAA[i];aAC[i]+=r.sumAC[i];aTA[i]+=r.sumTA[i];aTC[i]+=r.sumTC[i];if(r.hasAA[i])hAA[i]=true;if(r.hasAC[i])hAC[i]=true;}
  });
  const totalCols=3+6*2+2;
  let totHtml='<table class="ex-tbl" style="margin-top:6px">'+
    '<tr class="tr-title"><td colspan="'+totalCols+'">【'+y+'年'+m+'月度】AQUALIE　全店合計</td></tr>'+
    '<tr><th class="th-dk" rowspan="2" colspan="2">区分</th><th class="th-no" rowspan="2">月間目標合計</th>';
  for(let i=0;i<6;i++) totHtml+='<th class="th-no" colspan="2">NO.'+(i+1)+'</th>';
  totHtml+='<th class="th-dk" rowspan="2">売上残</th><th class="th-dk" rowspan="2">客数残</th></tr><tr>';
  for(let i=0;i<6;i++) totHtml+='<th class="th-tgt">目標<br><span style="font-size:8px">'+NP[i]+'%</span></th><th class="th-act">実績</th>';
  totHtml+='</tr>';
  const atNA=nkCell(aG, aAA[5], hAA[5]);
  const atNC=nkCell(aT, aAC[5], hAC[5]);
  let ar1='<tr class="tr-all-sum"><td colspan="2">全店合計（客数）</td><td>'+aT+'名</td>';
  let ar2='<tr class="tr-all-sum"><td colspan="2">全店合計（売上）</td><td>¥'+aG.toLocaleString()+'</td>';
  for(let i=0;i<6;i++){
    ar1+='<td style="opacity:.8">'+aTC[i]+'</td><td>'+(hAC[i]?aAC[i]:'')+'</td>';
    ar2+='<td style="opacity:.8">'+aTA[i].toLocaleString()+'</td><td>'+(hAA[i]?aAA[i].toLocaleString():'')+'</td>';
  }
  ar1+='<td class="'+atNA.cls+'">'+atNA.txt+'</td><td class="'+atNC.cls+'">'+atNC.txt+'</td></tr>';
  ar2+='<td></td><td></td></tr>';
  totHtml+=ar1+ar2+'</table>';
  document.getElementById('listWrap').innerHTML=html+totHtml;
}

// ===== Excel出力 =====
function exportExcel(){
  if(!window.XLSX){const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=doExport;document.head.appendChild(s);}
  else doExport();
}
function doExport(){
  const XL=window.XLSX,y=st.y,m=st.lm,wb=XL.utils.book_new();
  stores.forEach(s=>makeSheet(XL,wb,s,y,m));
  makeAllSheet(XL,wb,y,m);
  makeGoalSheet(XL,wb);
  XL.writeFile(wb,'AQUALIE_'+y+'年'+m+'月.xlsx');
  showToast('Excel出力しました ✓');
}
function makeSheet(XL,wb,store,y,m){
  const rows=[['【'+y+'年'+m+'月度】AQUALIE　'+store.name,...Array(15).fill('')]];
  rows.push([]);
  const h=['スタッフ','区分','月間目標'];
  for(let i=0;i<6;i++){h.push('NO.'+(i+1)+' 目標('+NP[i]+'%)','NO.'+(i+1)+' 実績');}
  h.push('売上残','客数残');rows.push(h);
  store.staff.forEach(staff=>{
    const g=sGoal(store.id,staff.name,y,m);
    const amts=[],cnts=[];
    for(let n=1;n<=6;n++){amts.push(getAmt(y,m,store.id,staff.name,n));cnts.push(getCnt(y,m,store.id,staff.name,n));}
    let latNo=0,latNoC=0;
    for(let n=6;n>=1;n--){if(amts[n-1]!==null&&!latNo)latNo=n;if(cnts[n-1]!==null&&!latNoC)latNoC=n;}
    const r1=[staff.name,'購入客目標','¥'+g.goal.toLocaleString()+'/'+g.target+'名'];
    const r2=['','目標',''];const r3=['','購入単価',''];
    for(let i=0;i<6;i++){
      r1.push(Math.round(g.target*NP[i]/100),cnts[i]!==null?cnts[i]:'');
      r2.push(Math.round(g.goal*NP[i]/100),amts[i]!==null?amts[i]:'');
      const u=(amts[i]!==null&&cnts[i]!==null&&cnts[i]>0)?Math.round(amts[i]/cnts[i]):'';
      r3.push('',u);
    }
    const remA=latNo>0?Math.round(g.goal*NP[latNo-1]/100)-(amts[latNo-1]||0):'';
    const remC=latNoC>0?Math.round(g.target*NP[latNoC-1]/100)-(cnts[latNoC-1]||0):'';
    r1.push('','');r2.push(remA,'');r3.push('',remC);
    rows.push(r1,r2,r3);
  });
  const ws=XL.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:9},{wch:8},{wch:12},...Array(12).fill({wch:9}),{wch:9},{wch:8}];
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:16}}];
  store.staff.forEach((_,i)=>{const r=3+i*3;ws['!merges'].push({s:{r,c:0},e:{r:r+2,c:0}},{s:{r,c:2},e:{r:r+2,c:2}});});
  XL.utils.book_append_sheet(wb,ws,m+'月_'+store.name);
}
function makeAllSheet(XL,wb,y,m){
  const rows=[['【'+y+'年'+m+'月度】AQUALIE　全店合計',...Array(15).fill('')]];
  rows.push([]);
  const h=['区分','','月間目標'];
  for(let i=0;i<6;i++){h.push('NO.'+(i+1)+' 目標','NO.'+(i+1)+' 実績');}
  h.push('売上残','客数残');rows.push(h);
  let aG=0,aT=0,aC=Array(6).fill(0),aA=Array(6).fill(0),aTC=Array(6).fill(0),aTA=Array(6).fill(0);
  stores.forEach(s=>{s.staff.forEach(sf=>{
    const g=sGoal(s.id,sf.name,y,m);aG+=g.goal;aT+=g.target;
    for(let i=0;i<6;i++){const c=getCnt(y,m,s.id,sf.name,i+1),a=getAmt(y,m,s.id,sf.name,i+1);aC[i]+=(c||0);aA[i]+=(a||0);aTC[i]+=Math.round(g.target*NP[i]/100);aTA[i]+=Math.round(g.goal*NP[i]/100);}
  });});
  const ar1=['全店合計','購入客','¥'+aG.toLocaleString()+'/'+aT+'名'];
  const ar2=['','売上',''];
  for(let i=0;i<6;i++){ar1.push(aTC[i],aC[i]||'');ar2.push(aTA[i],aA[i]||'');}
  ar1.push('',aC[5]-aT);ar2.push(aA[5]-aG,'');
  rows.push(ar1,ar2);
  const ws=XL.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:8},{wch:12},...Array(12).fill({wch:9}),{wch:9},{wch:8}];
  XL.utils.book_append_sheet(wb,ws,m+'月_全店');
}

// ===== 目標値シート出力 =====
function makeGoalSheet(XL,wb){
  const rows=[['AQUALIE 目標値設定一覧']];
  rows.push([]);
  const cy=new Date().getFullYear();
  ['H1','H2'].forEach(period=>{
    const label=period==='H1'?'上半期（1〜6月）':'下半期（7〜12月）';
    rows.push([label,'','目標客数','目標金額']);
    stores.forEach(store=>{
      store.staff.forEach(s=>{
        const g=sGoal(store.id,s.name,cy,period==='H1'?1:7);
        rows.push([store.name,s.name,g.target,g.goal]);
      });
    });
    rows.push([]);
  });
  const ws=XL.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:10},{wch:12},{wch:10},{wch:12}];
  XL.utils.book_append_sheet(wb,ws,'目標値');
}

function renderAdmStaff(){

  const store=stores.find(s=>s.id===sid);
  if(!store){document.getElementById('admStTbl').innerHTML='';return;}
  let html='<table class="adm-tbl"><thead><tr><th>スタッフ名</th><th>目標客数</th><th>目標金額</th><th></th></tr></thead><tbody>';
  store.staff.forEach((s,i)=>{
    const g=sGoal(sid,s.name,y,1);
    html+='<tr><td>'+s.name+'</td>'+
      '<td><input type="number" class="adm-in" id="at'+i+'" value="'+g.target+'"></td>'+
      '<td><input type="number" class="adm-in" id="ag'+i+'" value="'+g.goal+'"></td>'+
      '<td><button class="btn-del" onclick="delAdmStaff(\''+sid+'\','+i+')">削除</button></td></tr>';
  });
  document.getElementById('admStTbl').innerHTML=html+'</tbody></table>';

function addAdmStaff(){
  const sid=document.getElementById('admSS').value,n=document.getElementById('naN').value.trim();
  const t=parseInt(document.getElementById('naT').value)||0,g=parseInt(document.getElementById('naG').value)||0;
  if(!n)return;
  const store=stores.find(s=>s.id===sid);if(store)store.staff.push({name:n,target:t,goal:g});
  ['naN','naT','naG'].forEach(i=>document.getElementById(i).value='');
  saveAll();renderAdmStaff();
}
function delAdmStaff(sid,i){
  if(!confirm('削除しますか？'))return;
  const store=stores.find(s=>s.id===sid);if(store)store.staff.splice(i,1);
  saveAll();renderAdmStaff();
}
function addStore(){
  const n=document.getElementById('newSN').value.trim();if(!n)return;
  stores.push({id:'s'+Date.now(),name:n,staff:[]});
  document.getElementById('newSN').value='';saveAll();renderAdmin();
}
function delStore(id){
  if(!confirm('削除しますか？'))return;
  stores=stores.filter(s=>s.id!==id);saveAll();renderAdmin();
}
function saveAdmin(){
  const sid=document.getElementById('admSS').value;
  const pr=document.getElementById('admPeriod').value;
  const y=parseInt(document.getElementById('admYear').value);
  const store=stores.find(s=>s.id===sid);
  if(store){
    store.staff.forEach((s,i)=>{
      const tEl=document.getElementById('at'+i);
      const gEl=document.getElementById('ag'+i);
      if(!tEl||!gEl)return;
      const t=parseInt(tEl.value)||0;
      const g=parseInt(gEl.value)||0;
      s.target=t;s.goal=g;
      goals[gkey(sid,s.name,y,pr)]={target:t,goal:g};
    });
  }
  saveAll();
  showToast('設定を保存しました ✓');
  setTimeout(goTop,900);
}
function changePw(){
  const cur=document.getElementById('pwCur').value;
  const nw=document.getElementById('pwNew').value;
  const nw2=document.getElementById('pwNew2').value;
  const msg=document.getElementById('pwMsg');
  if(cur!==getPW()){msg.style.color='#CC0000';msg.textContent='現在のパスワードが違います';return;}
  if(!nw){msg.style.color='#CC0000';msg.textContent='新しいパスワードを入力してください';return;}
  if(nw!==nw2){msg.style.color='#CC0000';msg.textContent='確認用パスワードが一致しません';return;}
  localStorage.setItem('aq_pw',nw);
  ['pwCur','pwNew','pwNew2'].forEach(id=>document.getElementById(id).value='');
  msg.style.color='#375623';msg.textContent='✓ パスワードを変更しました';
  setTimeout(()=>msg.textContent='',2000);
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg||'保存しました ✓';
  t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>t.style.transform='translateX(-50%) translateY(80px)',2200);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('scInput').style.display!=='none')saveAmt();
  if(e.key==='Enter'&&!document.getElementById('pwModal').classList.contains('hidden'))checkPw();
});
st.lm=st.m;
goTop();
</script>
